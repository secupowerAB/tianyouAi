<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI英语作文生成器 - Essay Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --primary-dark: #1a2332;
            --primary-blue: #2d4263;
            --accent-gold: #c9a961;
            --accent-light: #f4e9d8;
            --text-dark: #1f1f1f;
            --text-light: #f8f9fa;
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-hard: 0 12px 48px rgba(0, 0, 0, 0.15);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Crimson Pro', 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(201, 169, 97, 0.05) 0%, transparent 70%);
            animation: rotate 60s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 50%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: var(--primary-blue);
            opacity: 0.8;
            font-weight: 400;
        }
        
        .main-card {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--shadow-hard);
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .main-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-gold));
        }
        
        .form-section {
            margin-bottom: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
        }
        
        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            font-family: 'Crimson Pro', 'Noto Serif SC', serif;
            border: 2px solid #e0e6ed;
            border-radius: 12px;
            background: #f8f9fa;
            transition: all 0.3s ease;
            color: var(--text-dark);
        }
        
        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: white;
            box-shadow: 0 4px 16px rgba(201, 169, 97, 0.15);
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .button-primary {
            width: 100%;
            padding: 1.25rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Crimson Pro', 'Noto Serif SC', serif;
            color: white;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-soft);
            position: relative;
            overflow: hidden;
        }
        
        .button-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .button-primary:hover::before {
            left: 100%;
        }
        
        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(45, 66, 99, 0.3);
        }
        
        .button-primary:active {
            transform: translateY(0);
        }
        
        .button-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-section {
            display: none;
            animation: fadeInUp 0.6s ease-out;
        }
        
        .result-section.active {
            display: block;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--accent-light);
        }
        
        .result-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-dark);
        }
        
        .button-secondary {
            padding: 0.75rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Crimson Pro', 'Noto Serif SC', serif;
            color: var(--primary-blue);
            background: var(--accent-light);
            border: 2px solid var(--accent-gold);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .button-secondary:hover {
            background: var(--accent-gold);
            color: white;
            transform: translateY(-2px);
        }
        
        .essay-output {
            background: #fafbfc;
            padding: 2rem;
            border-radius: 12px;
            border-left: 4px solid var(--accent-gold);
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-dark);
            white-space: pre-wrap;
            font-family: 'Crimson Pro', serif;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 3rem;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 1rem;
            border: 4px solid var(--accent-light);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 1.1rem;
            color: var(--primary-blue);
            font-weight: 600;
        }
        
        .api-key-section {
            background: linear-gradient(135deg, #fff9e6 0%, #fff3d4 100%);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 2px solid var(--accent-gold);
        }
        
        .api-key-section h3 {
            color: var(--primary-dark);
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
        }
        
        .api-key-section p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        
        .info-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: var(--primary-blue);
            color: white;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--primary-blue);
            font-size: 0.95rem;
            opacity: 0.8;
        }
        
        .word-count {
            text-align: right;
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            h1 {
                font-size: 2.5rem;
            }
            
            .main-card {
                padding: 1.5rem;
            }
            
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI英语作文生成器</h1>
            <p class="subtitle">Essay Generator Powered by AI</p>
        </header>
        
        <div class="main-card">
            <div class="api-key-section">
                <h3>🔑 API密钥配置</h3>
                <p>本应用使用Anthropic Claude API。请在下方输入您的API密钥（可从 <a href="https://console.anthropic.com" target="_blank" style="color: var(--primary-blue); font-weight: 600;">console.anthropic.com</a> 获取）</p>
                <input type="password" id="apiKey" placeholder="请输入API密钥 (sk-ant-...)" style="margin-bottom: 0.5rem;">
                <div class="info-badge">密钥仅存储在本地，不会上传</div>
            </div>
            
            <div class="form-section">
                <div class="form-group">
                    <label for="essayTopic">📝 作文主题/标题</label>
                    <input type="text" id="essayTopic" placeholder="例如：The Importance of Environmental Protection">
                </div>
                
                <div class="form-group">
                    <label for="additionalInfo">💡 补充说明（可选）</label>
                    <textarea id="additionalInfo" placeholder="例如：需要包含具体例子、引用名言、讨论科技影响等..."></textarea>
                </div>
                
                <div class="options-grid">
                    <div class="form-group">
                        <label for="essayType">📚 作文类型</label>
                        <select id="essayType">
                            <option value="argumentative">议论文 (Argumentative)</option>
                            <option value="narrative">记叙文 (Narrative)</option>
                            <option value="expository">说明文 (Expository)</option>
                            <option value="descriptive">描写文 (Descriptive)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="wordCount">📏 字数要求</label>
                        <select id="wordCount">
                            <option value="200">约200词</option>
                            <option value="300" selected>约300词</option>
                            <option value="400">约400词</option>
                            <option value="500">约500词</option>
                        </select>
                    </div>
                </div>
                
                <button class="button-primary" onclick="generateEssay()" id="generateBtn">
                    ✨ 生成作文
                </button>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p class="loading-text">AI正在创作中，请稍候...</p>
            </div>
            
            <div class="result-section" id="resultSection">
                <div class="result-header">
                    <h2 class="result-title">生成结果</h2>
                    <button class="button-secondary" onclick="copyEssay()">📋 复制作文</button>
                </div>
                <div class="essay-output" id="essayOutput"></div>
                <div class="word-count" id="wordCount"></div>
            </div>
        </div>
        
        <footer>
            <p>🎓 2026沈阳市中小学生信息素养提升实践活动参赛作品</p>
            <p>作者：张天佑 | 沈阳市第二十八中学 高一八班</p>
        </footer>
    </div>
    
    <script>
        // 从本地存储加载API密钥
        document.addEventListener('DOMContentLoaded', function() {
            const savedKey = localStorage.getItem('apiKey');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
            }
            
            // 监听API密钥输入，自动保存
            document.getElementById('apiKey').addEventListener('change', function() {
                localStorage.setItem('apiKey', this.value);
            });
        });
        
        async function generateEssay() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const topic = document.getElementById('essayTopic').value.trim();
            const additionalInfo = document.getElementById('additionalInfo').value.trim();
            const essayType = document.getElementById('essayType').value;
            const wordCount = document.getElementById('wordCount').value;
            
            // 验证输入
            if (!apiKey) {
                alert('请先输入API密钥！');
                return;
            }
            
            if (!topic) {
                alert('请输入作文主题！');
                return;
            }
            
            // 显示加载状态
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('loading').classList.add('active');
            document.getElementById('resultSection').classList.remove('active');
            
            // 构建提示词
            const essayTypeMap = {
                argumentative: 'argumentative essay (议论文)',
                narrative: 'narrative essay (记叙文)',
                expository: 'expository essay (说明文)',
                descriptive: 'descriptive essay (描写文)'
            };
            
            let prompt = `Write a high-quality English ${essayTypeMap[essayType]} for a Chinese high school student on the topic: "${topic}".\n\n`;
            prompt += `Requirements:\n`;
            prompt += `- Length: approximately ${wordCount} words\n`;
            prompt += `- Level: suitable for Chinese high school students\n`;
            prompt += `- Structure: clear introduction, body paragraphs, and conclusion\n`;
            prompt += `- Language: use varied vocabulary and sentence structures\n`;
            
            if (additionalInfo) {
                prompt += `- Additional requirements: ${additionalInfo}\n`;
            }
            
            prompt += `\nPlease write the complete essay directly, without any preamble or explanation.`;
            
            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 2000,
                        messages: [{
                            role: 'user',
                            content: prompt
                        }]
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || '生成失败，请检查API密钥');
                }
                
                const data = await response.json();
                const essay = data.content[0].text;
                
                // 显示结果
                document.getElementById('essayOutput').textContent = essay;
                document.getElementById('resultSection').classList.add('active');
                
                // 计算字数
                const words = essay.split(/\s+/).filter(w => w.length > 0).length;
                document.getElementById('wordCount').textContent = `字数统计: ${words} 词`;
                
            } catch (error) {
                alert('生成失败: ' + error.message);
                console.error('Error:', error);
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('generateBtn').disabled = false;
            }
        }
        
        function copyEssay() {
            const essay = document.getElementById('essayOutput').textContent;
            navigator.clipboard.writeText(essay).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✅ 已复制';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                alert('复制失败，请手动选择复制');
            });
        }
        
        // 支持回车键提交
        document.getElementById('essayTopic').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateEssay();
            }
        });
    </script>
</body>
</html>
